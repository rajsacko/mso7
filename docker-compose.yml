# Coolify: set Base Directory = / and use this compose, OR deploy Dockerfile alone
# with a persistent volume mounted at /app/data
services:
  mso7:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_ROOT=/app/data
      - MAX_RENDER_SECONDS=${MAX_RENDER_SECONDS:-180}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - REMOTION_CHROME_EXECUTABLE_PATH=/usr/bin/chromium
    volumes:
      - mso7-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  mso7-data:
